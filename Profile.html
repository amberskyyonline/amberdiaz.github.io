<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#F0EAD6;

font-family:Verdana,Arial,sans-serif;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

.wrapper{

text-align:center;

}

.logo{

width:min(520px,90vw);

margin-bottom:45px;

image-rendering:pixelated;

}

.grid{

display:grid;

grid-template-columns:repeat(3,180px);

gap:22px;

justify-content:center;

}

.card{

display:block;

background:white;

border:2px solid black;

padding:14px;

text-decoration:none;

color:black;

transition:.18s;

}

.card:hover{

transform:translateY(-4px) scale(1.04);

background:black;

color:white;

box-shadow:8px 8px 0px rgba(0,0,0,.25);

}

.card img{

width:100%;

height:120px;

object-fit:cover;

border:1px solid black;

margin-bottom:12px;

}

.card span{

display:block;

font-size:.85rem;

letter-spacing:.25em;

font-weight:bold;

}

.footer{

margin-top:35px;

font-size:.75rem;

letter-spacing:.2em;

color:#666;

}

@media(max-width:700px){

.grid{

grid-template-columns:repeat(2,150px);

gap:18px;

}

.card img{

height:100px;

}

}

</style>

</head>
