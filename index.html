<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:#F0EAD6;

    font-family:Helvetica,Arial,sans-serif;

    overflow:hidden;

}

#container{

    text-align:center;

}

#logo{

    width:min(500px,90vw);

    image-rendering:pixelated;

    margin-bottom:40px;

}

h1{

    font-size:1.3rem;

    font-weight:400;

    margin-bottom:15px;

    letter-spacing:.05em;

}

p{

    font-size:.95rem;

    color:#555;

    margin-bottom:35px;

}

.buttons{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;

}

button{

    padding:15px 45px;

    border:3px solid #111;

    background:white;

    cursor:pointer;

    font-size:1rem;

    font-family:Courier New, monospace;

    transition:.25s;

}

button:hover{

    background:black;

    color:white;

}

#message{

    margin-top:35px;

    font-size:.9rem;

    color:#666;

    min-height:25px;

    letter-spacing:.05em;

}

#loading{

    display:none;

    margin-top:40px;

}

.bar{

    width:320px;

    height:18px;

    border:2px solid black;

    margin:auto;

}

.fill{

    width:0%;

    height:100%;

    background:black;

}

.loading-text{

    margin-top:12px;

    font-family:Courier New, monospace;

}

</style>

</head>

<body>

<div id="container">

<img src="copyright1.gif" id="logo">

<h1>Do you promise not to copy?</h1>

<p>
This portfolio contains years of work, ideas, and experiments.
</p>

<div class="buttons">

<button id="yes">
YES I PROMISE
</button>

<button id="no">
...No
</button>

</div>

<div id="message"></div>

<div id="loading">

<div class="bar">

<div class="fill"></div>

</div>

<div class="loading-text">

Verifying...

</div>

</div>

</div>

<script>

const no=document.getElementById("no");

const yes=document.getElementById("yes");

const message=document.getElementById("message");

const loading=document.getElementById("loading");

const fill=document.querySelector(".fill");

const loadingText=document.querySelector(".loading-text");

const responses=[

"You Dead ass?",

"Nah",

"Aigh stop playing",

"Wrong answer",

"Don't do me like that",

"Try again",

"😭"

];

let count=0;

no.addEventListener("mouseover",()=>{

    no.style.position="absolute";

    no.style.left=Math.random()*(window.innerWidth-160)+"px";

    no.style.top=Math.random()*(window.innerHeight-70)+"px";

    message.textContent=responses[count%responses.length];

    count++;

});

yes.addEventListener("click",()=>{

document.querySelector(".buttons").style.display="none";

message.style.display="none";

loading.style.display="block";

let percent=0;

const interval=setInterval(()=>{

percent+=2;

fill.style.width=percent+"%";

if(percent<30){

loadingText.textContent="Checking plagiarism history...";

}

else if(percent<60){

loadingText.textContent="Scanning internet archives...";

}

else if(percent<90){

loadingText.textContent="Looking for suspicious behavior...";

}

else{

loadingText.textContent="You're probably cool.";

}

if(percent>=100){

clearInterval(interval);

loadingText.textContent="Entering Portfolio...";

setTimeout(()=>{

window.location.href="Profile.html";

},1200);

}

},40);

});

</script>

</body>

</html>
